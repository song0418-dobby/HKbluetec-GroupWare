<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HKbluetec 그룹웨어</title>
  <style>
    body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
    .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
    input, button, textarea { margin: 5px 0; padding: 8px; width: 100%; box-sizing: border-box; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background-color: #0056b3; }
    ul { list-style: none; padding: 0; }
    li { background: #f4f4f4; margin: 5px 0; padding: 10px; border-radius: 4px; }
  </style>
</head>
<body>

  <h1>HKbluetec 전자결재 시스템 (실시간 연동)</h1>

  <!-- 결재 작성 양식 -->
  <div class="box">
    <h3>📄 결재 상신 작성</h3>
    <input type="text" id="docTitle" placeholder="문서 제목을 입력하세요">
    <textarea id="docContent" placeholder="결재 내용을 입력하세요" rows="4"></textarea>
    <button id="btnSubmit">결재 상신하기</button>
  </div>

  <!-- 실시간 결재 목록 -->
  <div class="box">
    <h3>📋 결재 상신 목록 (실시간 자동 업데이트)</h3>
    <ul id="docList">
      <li>데이터를 불러오는 중입니다...</li>
    </ul>
  </div>

  <!-- Firebase 실시간 동작 스크립트 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, orderBy } 
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Firebase 파이어베이스 접속 키
    const firebaseConfig = {
      apiKey: "AIzaSyAgEmCFvCI7Ou8jPkfngObTLJGaYPQbz18",
      authDomain: "hkbluetec.firebaseapp.com",
      projectId: "hkbluetec",
      storageBucket: "hkbluetec.firebasestorage.app",
      messagingSenderId: "997191589965",
      appId: "1:997191589965:web:e29d58d70c8e8d3d24fc04"
    };

    // Firebase 초기화 및 DB 연결
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docsCollection = collection(db, "approvals");

    // 1. 결재 상신하기 (DB에 저장)
    document.getElementById("btnSubmit").addEventListener("click", async () => {
      const title = document.getElementById("docTitle").value.trim();
      const content = document.getElementById("docContent").value.trim();

      if (!title || !content) {
        alert("제목과 내용을 모두 입력해주세요!");
        return;
      }

      try {
        await addDoc(docsCollection, {
          title: title,
          content: content,
          createdAt: serverTimestamp()
        });
        alert("결재가 정상적으로 상신되었습니다!");
        document.getElementById("docTitle").value = "";
        document.getElementById("docContent").value = "";
      } catch (e) {
        console.error("저장 실패:", e);
        alert("저장에 실패했습니다. Firestore 보안 규칙을 확인해주세요.");
      }
    });

    // 2. 실시간 목록 불러오기 (DB 실시간 감시)
    const q = query(docsCollection, orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
      const listEl = document.getElementById("docList");
      listEl.innerHTML = "";

      if (snapshot.empty) {
        listEl.innerHTML = "<li>상신된 결재 문서가 없습니다.</li>";
        return;
      }

      snapshot.forEach((doc) => {
        const data = doc.data();
        const li = document.createElement("li");
        li.innerHTML = `<strong>[제목] ${data.title}</strong><br>${data.content}`;
        listEl.appendChild(li);
      });
    });
  </script>
</body>
</html>
