<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK블루텍 그룹웨어</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDK (v9 호환 모드) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">

    <!-- 상단 네비게이션 바 -->
    <nav class="bg-slate-900 text-white p-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-bold tracking-wider text-blue-400">🔷 HK블루텍 GROUPWARE</span>
            <span id="sync-status" class="text-xs bg-emerald-600 px-2 py-1 rounded-full">실시간 연동 중</span>
        </div>
        <div class="space-x-4 text-sm font-medium">
            <button onclick="switchTab('dashboard')" class="hover:text-blue-300">홈</button>
            <button onclick="switchTab('approval')" class="hover:text-blue-300">전자결재</button>
            <button onclick="switchTab('calendar')" class="hover:text-blue-300">일정 캘린더</button>
            <button onclick="switchTab('org')" class="hover:text-blue-300">조직도 관리</button>
            <button onclick="switchTab('members')" class="hover:text-blue-300">회원 관리</button>
            <button onclick="handleLogout()" id="logout-btn" class="hidden bg-red-600 hover:bg-red-700 px-3 py-1 rounded">로그아웃</button>
        </div>
    </nav>

    <!-- 메인 컨테이너 -->
    <main class="container mx-auto mt-6 p-4">
        
        <!-- 대시보드 화면 -->
        <section id="dashboard" class="tab-content">
            <h2 class="text-2xl font-bold mb-4">대시보드</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-gray-500 text-sm font-bold">📄 진행중인 전자결재</h3>
                    <p id="dash-approval-count" class="text-3xl font-bold mt-2 text-blue-600">0 건</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-gray-500 text-sm font-bold">📅 등록된 사내 일정</h3>
                    <p id="dash-calendar-count" class="text-3xl font-bold mt-2 text-emerald-600">0 건</p>
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <h3 class="text-gray-500 text-sm font-bold">👥 등록 임직원 수</h3>
                    <p id="dash-user-count" class="text-3xl font-bold mt-2 text-purple-600">0 명</p>
                </div>
            </div>
        </section>

        <!-- 회원 관리 화면 -->
        <section id="members" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-4">임직원 및 회원 관리</h2>
            <div class="bg-white rounded-lg shadow p-4 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-100 border-b">
                            <th class="p-3">아이디</th>
                            <th class="p-3">이름</th>
                            <th class="p-3">직급</th>
                            <th class="p-3">부서</th>
                            <th class="p-3">권한</th>
                        </tr>
                    </thead>
                    <tbody id="user-list-tbody">
                        <tr><td colspan="5" class="p-4 text-center text-gray-400">등록된 회원이 없습니다.</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- 전자결재 화면 -->
        <section id="approval" class="tab-content hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">전자결재</h2>
                <button onclick="openApprovalModal()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">+ 새 결재 작성</button>
            </div>
            <div class="bg-white rounded-lg shadow p-4">
                <div id="approval-list" class="space-y-3">
                    <p class="text-center text-gray-400 py-6">상신된 결재 문서가 없습니다.</p>
                </div>
            </div>
        </section>

        <!-- 기타 탭 영역 (캘린더 / 조직도) -->
        <section id="calendar" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-4">일정 캘린더</h2>
            <div class="bg-white p-6 rounded shadow">사내 공유 일정 캘린더 영역입니다.</div>
        </section>
        
        <section id="org" class="tab-content hidden">
            <h2 class="text-2xl font-bold mb-4">조직도</h2>
            <div class="bg-white p-6 rounded shadow">사내 조직도 영역입니다.</div>
        </section>
    </main>

    <!-- 로그인/회원가입 모달 -->
    <div id="auth-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
            <div class="flex border-b mb-4">
                <button id="tab-login-btn" onclick="switchAuthMode('login')" class="w-1/2 py-2 font-bold text-blue-600 border-b-2 border-blue-600">로그인</button>
                <button id="tab-signup-btn" onclick="switchAuthMode('signup')" class="w-1/2 py-2 font-bold text-gray-400">회원가입</button>
            </div>

            <!-- 로그인 폼 -->
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
                    <input type="text" id="login-id" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="login-pw" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">로그인</button>
            </form>

            <!-- 회원가입 폼 -->
            <form id="signup-form" onsubmit="handleSignup(event)" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">아이디</label>
                    <input type="text" id="signup-id" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">비밀번호</label>
                    <input type="password" id="signup-pw" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">이름</label>
                    <input type="text" id="signup-name" required class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">직급</label>
                    <input type="text" id="signup-position" placeholder="예: 대리" class="w-full border p-2 rounded outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">부서</label>
                    <input type="text" id="signup-dept" placeholder="예: 개발팀" class="w-full border p-2 rounded outline-none">
                </div>
                <button type="submit" class="w-full bg-emerald-600 text-white py-2 rounded font-bold hover:bg-emerald-700">회원가입 등록</button>
            </form>
        </div>
    </div>

    <!-- 스크립트 작성 영역 -->
    <script>
        // -------------------------------------------------------------
        // 1. 전역 변수 먼저 선언 (에러 방지의 핵심!)
        // -------------------------------------------------------------
        let globalUsers = [];
        let globalApprovals = [];
        let currentUser = null;

        // -------------------------------------------------------------
        // 2. Firebase 설정 및 초기화
        // -------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "hkbluetec-groupware.firebaseapp.com",
            // ⚠️ databaseURL 끝에 경로나 슬래시가 들어가면 안 됩니다.
            databaseURL: "https://hkbluetec-groupware-default-rtdb.firebaseio.com",
            projectId: "hkbluetec-groupware",
            storageBucket: "hkbluetec-groupware.appspot.com",
            messagingSenderId: "123456789",
            appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // -------------------------------------------------------------
        // 3. 실시간 데이터 동기화 리스너 (Firebase -> 전역 변수 -> 화면)
        // -------------------------------------------------------------
        // 회원 목록 실시간 감시
        db.ref('users').on('value', (snapshot) => {
            const data = snapshot.val();
            globalUsers = data ? Object.values(data) : [];
            renderUserList();
            updateDashboard();
        }, (error) => {
            console.error("회원 데이터 수신 에러:", error);
        });

        // 전자결재 실시간 감시
        db.ref('approvals').on('value', (snapshot) => {
            const data = snapshot.val();
            globalApprovals = data ? Object.values(data) : [];
            renderApprovalList();
            updateDashboard();
        }, (error) => {
            console.error("결재 데이터 수신 에러:", error);
        });

        // -------------------------------------------------------------
        // 4. 인증 및 로그인/회원가입 로직
        // -------------------------------------------------------------
        function handleSignup(e) {
            e.preventDefault();
            const id = document.getElementById('signup-id').value.trim();
            const pw = document.getElementById('signup-pw').value.trim();
            const name = document.getElementById('signup-name').value.trim();
            const position = document.getElementById('signup-position').value.trim() || '사원';
            const dept = document.getElementById('signup-dept').value.trim() || '미정';

            if (!id || !pw || !name) {
                alert('필수 입력 항목을 채워주세요.');
                return;
            }

            // 중복 확인
            const exists = globalUsers.some(u => u.id === id);
            if (exists) {
                alert('이미 존재하는 아이디입니다.');
                return;
            }

            const newUser = {
                id: id,
                pw: pw,
                name: name,
                position: position,
                dept: dept,
                role: (id === 'song0418_hk') ? '최고관리자' : '일반',
                createdAt: new Date().toISOString()
            };

            // Firebase Realtime DB에 즉시 저장
            db.ref('users/' + id).set(newUser, (error) => {
                if (error) {
                    alert('회원가입 실패: ' + error.message);
                } else {
                    alert('회원가입이 완료되었습니다! 로그인해 주세요.');
                    switchAuthMode('login');
                    document.getElementById('signup-form').reset();
                }
            });
        }

        function handleLogin(e) {
            e.preventDefault();
            const id = document.getElementById('login-id').value.trim();
            const pw = document.getElementById('login-pw').value.trim();

            // 최고관리자 기본 계정 예외 처리
            if (id === 'song0418_hk' && pw === '1234') {
                currentUser = { id: 'song0418_hk', name: '최고관리자', role: '최고관리자', dept: '관리부' };
                onLoginSuccess();
                return;
            }

            const user = globalUsers.find(u => u.id === id && u.pw === pw);
            if (user) {
                currentUser = user;
                onLoginSuccess();
            } else {
                alert('아이디 또는 비밀번호가 올바르지 않습니다.');
            }
        }

        function onLoginSuccess() {
            document.getElementById('auth-modal').classList.add('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            alert(`${currentUser.name}님 환영합니다!`);
        }

        function handleLogout() {
            currentUser = null;
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
        }

        function switchAuthMode(mode) {
            if (mode === 'login') {
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('signup-form').classList.add('hidden');
                document.getElementById('tab-login-btn').className = "w-1/2 py-2 font-bold text-blue-600 border-b-2 border-blue-600";
                document.getElementById('tab-signup-btn').className = "w-1/2 py-2 font-bold text-gray-400";
            } else {
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('signup-form').classList.remove('hidden');
                document.getElementById('tab-login-btn').className = "w-1/2 py-2 font-bold text-gray-400";
                document.getElementById('tab-signup-btn').className = "w-1/2 py-2 font-bold text-emerald-600 border-b-2 border-emerald-600";
            }
        }

        // -------------------------------------------------------------
        // 5. 렌더링 및 UI 업데이트
        // -------------------------------------------------------------
        function renderUserList() {
            const tbody = document.getElementById('user-list-tbody');
            if (globalUsers.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-400">등록된 회원이 없습니다.</td></tr>`;
                return;
            }

            tbody.innerHTML = globalUsers.map(u => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-3 font-medium">${u.id}</td>
                    <td class="p-3">${u.name}</td>
                    <td class="p-3">${u.position || '-'}</td>
                    <td class="p-3">${u.dept || '-'}</td>
                    <td class="p-3"><span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">${u.role || '일반'}</span></td>
                </tr>
            `).join('');
        }

        function renderApprovalList() {
            const container = document.getElementById('approval-list');
            if (globalApprovals.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-6">상신된 결재 문서가 없습니다.</p>`;
                return;
            }

            container.innerHTML = globalApprovals.map(a => `
                <div class="p-4 border rounded flex justify-between items-center bg-gray-50">
                    <div>
                        <h4 class="font-bold text-lg">${a.title}</h4>
                        <p class="text-sm text-gray-500">기안자: ${a.author} | 작성일: ${a.date}</p>
                    </div>
                    <span class="bg-yellow-100 text-yellow-800 text-xs px-3 py-1 rounded-full font-bold">${a.status || '대기중'}</span>
                </div>
            `).join('');
        }

        function updateDashboard() {
            document.getElementById('dash-user-count').innerText = `${globalUsers.length} 명`;
            document.getElementById('dash-approval-count').innerText = `${globalApprovals.length} 건`;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
        }
    </script>
</body>
</html>
